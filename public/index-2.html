<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>teleweb</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">

    <!-- Top bar (always visible, mobile + desktop) -->
    <header class="topbar">
      <button id="btnDrawerToggle" class="iconBtn" aria-label="Buka daftar akun">
        <span class="hamburger"></span>
      </button>
      <div class="topbarTitle">
        <span class="prompt">›</span>teleweb
      </div>
      <div class="activeAccountChip" id="activeAccountLabel">no account</div>
    </header>

    <!-- Overlay behind drawer on mobile -->
    <div id="drawerOverlay" class="drawerOverlay hidden"></div>

    <!-- Accounts drawer -->
    <aside id="drawer" class="drawer">
      <div class="drawerHead">
        <h2><span class="prompt">›</span> Accounts</h2>
        <button id="btnDrawerClose" class="iconBtn mobileOnly" aria-label="Tutup">✕</button>
      </div>

      <div id="accountList" class="accountList"></div>

      <button id="btnAddAccount" class="btn btnGhost btnBlock">+ Tambah akun</button>

      <div id="loginBox" class="loginBox hidden">
        <div class="tabs">
          <button id="tabPhone" class="tabBtn active">Phone / OTP</button>
          <button id="tabPyrogram" class="tabBtn">Import Pyrogram</button>
        </div>

        <div id="phoneLoginPanel" class="panelBody">
          <label class="field">
            <span>Label akun (opsional)</span>
            <input id="loginLabel" placeholder="kosongin = pakai nama Telegram" />
          </label>
          <label class="field">
            <span>Nomor HP</span>
            <input id="loginPhone" placeholder="+62..." />
          </label>
          <button id="btnSendCode" class="btn btnPrimary btnBlock">Kirim OTP</button>

          <div id="codeBox" class="hidden">
            <label class="field">
              <span>Kode OTP</span>
              <input id="loginCode" inputmode="numeric" placeholder="12345" />
            </label>
            <button id="btnVerifyCode" class="btn btnPrimary btnBlock">Verifikasi kode</button>
          </div>

          <div id="passBox" class="hidden">
            <label class="field">
              <span>Password 2FA</span>
              <input id="loginPassword" type="password" placeholder="••••••••" />
            </label>
            <button id="btnVerifyPassword" class="btn btnPrimary btnBlock">Verifikasi password</button>
          </div>
        </div>

        <div id="pyrogramPanel" class="panelBody hidden">
          <label class="field">
            <span>Label akun (opsional)</span>
            <input id="pyroLabel" placeholder="kosongin = pakai nama Telegram" />
          </label>
          <label class="field">
            <span>Pyrogram session string</span>
            <textarea id="pyroSession" rows="4" placeholder="paste di sini"></textarea>
          </label>
          <button id="btnImportPyrogram" class="btn btnPrimary btnBlock">Import & verifikasi</button>
        </div>

        <p id="loginStatus" class="statusText"></p>
      </div>
    </aside>

    <!-- Main content -->
    <main class="main">
      <div class="searchBar">
        <input id="usernameInput" placeholder="username buat lihat chat lain..." />
        <button id="btnLoadUserChat" class="btn btnPrimary">Buka</button>
      </div>

      <div class="content">
        <div id="chatList" class="chatList"></div>
        <div class="chatPane">
          <div id="chatHeader" class="chatHeader hidden">
            <button id="btnBack" class="iconBtn" aria-label="Kembali">←</button>
            <span id="chatTitle">Telegram</span>
          </div>
          <div id="messageView" class="messageView">
            <div class="emptyState">
              <span class="prompt">›</span> Pilih atau tambah akun buat mulai
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
